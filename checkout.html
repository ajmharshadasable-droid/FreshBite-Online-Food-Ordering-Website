<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FreshBite | Checkout</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- Navbar -->

    <header>

        <nav class="navbar">

            <img src="images/logo.jpeg" alt="Logo">

            <ul>

                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="restaurants.html">Restaurants</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>

            </ul>

            <a href="login.html">
                <button class="login-btn">Login</button>
            </a>

        </nav>

    </header>

    <!-- Banner -->

    <section class="page-banner">

        <div class="banner-content">

            <h1>Checkout</h1>

            <p>Home > Checkout</p>

        </div>

    </section>

    <!-- Checkout -->

    <section class="checkout">

        <div class="checkout-container">

            <!-- Billing Form -->

            <div class="checkout-form">

                <h2>Billing Details</h2>

                <form id="checkoutForm">

                    <input
                        type="text"
                        id="name"
                        placeholder="Full Name"
                        required>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                    <input
                        type="tel"
                        id="phone"
                        placeholder="Phone Number"
                        pattern="[0-9]{10}"
                        maxlength="10"
                        required>

                    <textarea
                        id="address"
                        placeholder="Delivery Address"
                        required></textarea>

                    <input
                        type="text"
                        id="city"
                        placeholder="City"
                        required>

                    <input
                        type="text"
                        id="pincode"
                        placeholder="Pincode"
                        pattern="[0-9]{6}"
                        maxlength="6"
                        required>

                    <h3>Payment Method</h3>

                    <label>
                        <input
                            type="radio"
                            name="payment"
                            value="Cash on Delivery"
                            checked>
                        Cash on Delivery
                    </label>

                    <label>
                        <input
                            type="radio"
                            name="payment"
                            value="UPI">
                        UPI
                    </label>

                    <label>
                        <input
                            type="radio"
                            name="payment"
                            value="Credit / Debit Card">
                        Credit / Debit Card
                    </label>

                    <h3>Select Delivery Time</h3>

                    <select id="deliveryTime" required>

                        <option value="30-40 Minutes">
                            30-40 Minutes (Standard)
                        </option>

                        <option value="45-60 Minutes">
                            45-60 Minutes
                        </option>

                        <option value="60-90 Minutes">
                            60-90 Minutes
                        </option>

                        <option value="Schedule Delivery">
                            Schedule Delivery
                        </option>

                    </select>

                    <button type="submit">
                        Place Order
                    </button>

                </form>

            </div>

            <!-- Order Summary -->

            <div class="order-summary">

                <h2>Order Summary</h2>

                <div class="coupon-box">

                    <input
                        type="text"
                        id="couponCode"
                        placeholder="Enter Coupon Code">

                    <button
                        type="button"
                        id="applyCoupon">
                        Apply
                    </button>

                </div>

                <p id="couponMessage"></p>

                <p>
                    Subtotal
                    <span id="checkoutSubtotal">₹428</span>
                </p>

                <p>
                    Delivery
                    <span>₹40</span>
                </p>

                <hr>

                <h3>
                    Total
                    <span id="checkoutTotal">₹468</span>
                </h3>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer class="footer">

        <p>© 2026 FreshBite | All Rights Reserved.</p>

    </footer>

    <script src="js/checkout.js"></script>

</body>

</html>
